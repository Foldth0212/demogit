<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    .whatyourname{
        font-size: 60px;
    }
    li:first-child{
        color: red;
    }
    li:last-child{
        color: violet;
    }
li:nth-child(3){
color: aqua;
}
li:nth-child(2){
color: rgb(40, 112, 41);
}
li:nth-child(4){
color: rgb(213, 12, 186);
}
</style>
<body>
    <strong class="whatyourname">what your name</strong>
    <br>
    <p class="myname">my name is baby</p>
    <hr>
    <ul>
        <li>1</li>
        <li>2</li>
        <li>3</li>
        <li>4</li>
        <li>5</li>
    </ul>
</body>
</html>
